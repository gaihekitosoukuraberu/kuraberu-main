name: Deploy to GAS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Install clasp
        run: npm install -g @google/clasp

      - name: 🔐 Setup authentication
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: 📂 Debug directory structure
        run: |
          echo "📁 Current directory: $(pwd)"
          echo "📋 Listing all files recursively:"
          ls -laR

      - name: 🚀 Deploy to GAS
        working-directory: gas-backend  # 👈 ls -laR の結果見て必要ならここを変更
        run: |
          echo '{
            "scriptId": "1VSHOIsq4wKeJZY1wZAoGjn4cvYg7kIa0LUW0k42sSmEP8rDuoV10kyrh",
            "scriptExtensions": [".js", ".gs"],
            "htmlExtensions": [".html"],
            "jsonExtensions": [".json"],
            "filePushOrder": [],
            "skipSubdirectories": false
          }' > .clasp.json
          clasp push --force
          clasp version "Deployed by GitHub Actions on $(date)"
