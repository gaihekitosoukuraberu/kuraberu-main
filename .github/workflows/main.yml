name: Deploy to GAS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Install clasp
        run: npm install -g @google/clasp

      - name: 🔧 Setup credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: 🔧 Setup clasp config
        working-directory: gas-backend
        run: echo '${{ secrets.CLASP_PROD_CONFIG }}' > .clasp.json

      - name: 🚀 Deploy to GAS
        working-directory: gas-backend
        run: |
          clasp push --force
          clasp version "Auto deployed by GitHub Actions"
