<\!-- 
  外壁塗装くらべる 相場チェックフォームコンポーネント
  このファイルは郵便番号入力フォームを定義します。
-->
<section class="price-form">
  <div class="price-form__container">
    <div class="price-form__header">
      <span class="price-form__badge">かんたん10秒！</span>
      <h3 class="price-form__title">郵便番号で今すぐ相場チェック！</h3>
    </div>
    <form id="zip-form" class="price-form__form">
      <div class="price-form__input-wrapper">
        <input 
          type="text" 
          id="zip-input" 
          class="price-form__input"
          placeholder="例：123-4567" 
          pattern="\d{3}-?\d{4}"
          maxlength="8"
          required
        >
      </div>
      <button type="submit" id="zip-submit" class="price-form__button">
        <span class="price-form__icon">🔍</span> 無料で相場を見る
      </button>
      <div class="price-form__security">
        <span class="price-form__lock-icon">🔒</span> 個人情報保護・SSL暗号化通信で安全
      </div>
    </form>
  </div>
</section>

<\!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading hidden">
  <div class="loading__content">
    <p class="loading__title">お見積もり情報を取得中...</p>
    <div class="loading__progress-container">
      <div class="loading__progress-bar" id="progress-bar"></div>
    </div>
    <ul class="loading__steps">
      <li class="loading__step" id="loading-step1">①条件分析中...</li>
      <li class="loading__step" id="loading-step2">②業者情報取得中...</li>
      <li class="loading__step" id="loading-step3">③相場計算中...</li>
    </ul>
  </div>
</div>
