name: Deploy Franchise Hearing App

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'franchise-hearing-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'franchise-hearing-app/**'
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  APP_NAME: 'franchise-hearing-app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'franchise-hearing-app/package-lock.json'
        
    - name: 📦 Install dependencies
      working-directory: ./franchise-hearing-app
      run: npm ci
      
    - name: 🔍 Run lint check
      working-directory: ./franchise-hearing-app
      run: npm run lint --if-present
      continue-on-error: true
      
    - name: 🏗️ Build application
      working-directory: ./franchise-hearing-app
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: 📊 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-dist
        path: franchise-hearing-app/dist/
        retention-days: 7
        
    - name: 🚀 Deploy to xserver via FTP
      if: github.ref == 'refs/heads/main'
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./franchise-hearing-app/dist/
        server-dir: /public_html/franchise-hearing/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.env*
          **/README.md
        dry-run: false
        
    - name: 📝 Deployment status
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🎉 franchise-hearing-app deployed successfully!"
        echo "📍 URL: https://your-domain.com/franchise-hearing/"
        echo "📊 Build size: $(du -sh franchise-hearing-app/dist/ | cut -f1)"
        
  # 通知ジョブ (オプション)
  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📧 Notify deployment status
      if: always()
      run: |
        if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
          echo "✅ franchise-hearing-app deployment succeeded"
        else
          echo "❌ franchise-hearing-app deployment failed"
        fi