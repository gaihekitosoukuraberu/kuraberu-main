<!doctype html><html lang=""><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>gaiheki-admin</title><script defer="defer" src="js/vendors.516231fa.js"></script><script defer="defer" src="js/app.63f73d7d.js"></script><link href="css/app.8bdd50f5.css" rel="stylesheet"></head><body><noscript><strong>We're sorry but gaiheki-admin doesn't work properly without JavaScript enabled. Please enable it to continue.</strong></noscript><div id="app"></div><div id="loginScreen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#dc2626,#b91c1c);z-index:10000;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:40px;border-radius:12px;width:400px;box-shadow:0 20px 25px rgba(0,0,0,0.15);"><h2 style="text-align:center;margin-bottom:30px;color:#333;">運営本部システム ログイン</h2><div style="margin-bottom:20px;"><input type="email" id="loginEmail" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:16px;" placeholder="メールアドレス"></div><div style="margin-bottom:20px;"><input type="password" id="loginPassword" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:16px;" placeholder="パスワード"></div><button id="loginBtn" style="width:100%;padding:12px;background:#dc2626;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;">ログイン</button></div></div><script>if(!localStorage.getItem('admin_token')){document.getElementById('loginScreen').style.display='block';}document.addEventListener('DOMContentLoaded',function(){document.getElementById('loginBtn').onclick=function(){var e=document.getElementById('loginEmail').value,p=document.getElementById('loginPassword').value;if(e&&p){localStorage.setItem('admin_token','token_'+Date.now());localStorage.setItem('admin_user',JSON.stringify({email:e,name:'管理者'}));document.getElementById('loginScreen').style.display='none';}else{alert('メールアドレスとパスワードを入力してください');}}});</script></body></html>
