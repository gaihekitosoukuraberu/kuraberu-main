<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運営本部システム - ログイン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', 'Noto Sans CJK JP', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 8px 0;
        }

        .login-subtitle {
            font-size: 16px;
            color: #6c757d;
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #495057;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .login-btn {
            padding: 14px 20px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover:not(:disabled) {
            background: #b91c1c;
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            .login-title {
                font-size: 20px;
            }
            
            .form-input {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">外壁塗装くらべるAI</h1>
            <p class="login-subtitle">運営本部システム</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label for="email" class="form-label">メールアドレス</label>
                <input
                    id="email"
                    type="text"
                    class="form-input"
                    placeholder="admin@example.com"
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <input
                    id="password"
                    type="password"
                    class="form-input"
                    placeholder="パスワードを入力"
                >
            </div>

            <button type="button" class="login-btn" onclick="doLogin()">
                ログイン
            </button>
        </div>
    </div>

    <script>
        function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('メールアドレスとパスワードを入力してください');
                return;
            }
            
            // ローディング状態
            const btn = document.querySelector('.login-btn');
            btn.disabled = true;
            btn.textContent = 'ログイン中...';
            
            // 認証情報を保存
            localStorage.setItem('admin_token', 'admin-token-' + Date.now());
            localStorage.setItem('admin_user', JSON.stringify({
                id: 'admin-' + Date.now(),
                name: '管理者',
                email: email,
                role: 'admin'
            }));
            
            // 元のVue.jsアプリにリダイレクト（1秒後）
            setTimeout(() => {
                window.location.href = '/admin/app.html';
            }, 1000);
        }
    </script>
</body>
</html>
