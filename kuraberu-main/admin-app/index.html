<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運営本部システム - ログイン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', 'Noto Sans CJK JP', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 8px 0;
        }

        .login-subtitle {
            font-size: 16px;
            color: #6c757d;
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #495057;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .form-input.error {
            border-color: #dc3545;
        }

        .password-input-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .error-message {
            font-size: 12px;
            color: #dc3545;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #495057;
        }

        .checkbox-input {
            width: 16px;
            height: 16px;
        }

        .checkbox-text {
            user-select: none;
        }

        .login-btn {
            padding: 14px 20px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover:not(:disabled) {
            background: #b91c1c;
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            padding: 12px 16px;
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
        }

        .forgot-password {
            color: #dc2626;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* レスポンシブ対応 */
        @media (max-width: 480px) {
            .login-container {
                padding: 24px;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            .login-title {
                font-size: 20px;
            }
            
            .form-input {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">外壁塗装くらべるAI</h1>
            <p class="login-subtitle">運営本部システム</p>
        </div>

        <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email" class="form-label">メールアドレス</label>
                <input
                    id="email"
                    type="text"
                    class="form-input"
                    placeholder="admin@example.com"
                    autocomplete="username"
                    required
                >
                <span id="email-error" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <div class="password-input-container">
                    <input
                        id="password"
                        type="password"
                        class="form-input"
                        placeholder="パスワードを入力"
                        required
                    >
                    <button
                        type="button"
                        class="password-toggle"
                        onclick="togglePassword()"
                    >
                        👁️
                    </button>
                </div>
                <span id="password-error" class="error-message"></span>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input
                        type="checkbox"
                        id="rememberMe"
                        class="checkbox-input"
                    >
                    <span class="checkbox-text">ログイン状態を保持する</span>
                </label>
            </div>

            <button type="submit" class="login-btn" id="loginBtn" onclick="handleLogin(event)">
                ログイン
            </button>

            <div id="loginError" class="login-error"></div>
        </form>

        <div class="login-footer">
            <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">
                パスワードを忘れた方はこちら
            </a>
        </div>
    </div>

    <script>
        console.log('Script loaded');
        
        // パスワード表示切り替え
        function togglePassword() {
            console.log('Toggle password clicked');
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // バリデーション
        function validateForm() {
            console.log('Validating form');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');
            
            let isValid = true;
            
            // エラーメッセージをリセット
            emailError.textContent = '';
            passwordError.textContent = '';
            document.getElementById('email').classList.remove('error');
            document.getElementById('password').classList.remove('error');
            
            if (!email) {
                emailError.textContent = 'メールアドレスは必須です';
                document.getElementById('email').classList.add('error');
                isValid = false;
            }
            
            if (!password) {
                passwordError.textContent = 'パスワードは必須です';
                document.getElementById('password').classList.add('error');
                isValid = false;
            }
            
            console.log('Validation result:', isValid);
            return isValid;
        }

        // ログイン処理
        function handleLogin(event) {
            console.log('=== LOGIN FUNCTION CALLED ===');
            event.preventDefault();
            event.stopPropagation();
            
            if (!validateForm()) {
                console.log('Form validation failed');
                return false;
            }

            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            console.log('Login attempt:', { email: email, passwordLength: password.length });
            
            // ローディング状態
            loginBtn.disabled = true;
            loginBtn.textContent = 'ログイン中...';
            loginError.style.display = 'none';
            
            // 即座にフォールバック認証を実行
            setTimeout(function() {
                try {
                    if (email && password) {
                        console.log('Processing login...');
                        
                        // ログイン成功時の処理
                        localStorage.setItem('admin_token', 'admin-token-' + Date.now());
                        localStorage.setItem('admin_user', JSON.stringify({
                            id: 'admin-' + Date.now(),
                            name: '管理者',
                            email: email,
                            role: 'admin'
                        }));
                        
                        // Remember Me の処理
                        if (document.getElementById('rememberMe').checked) {
                            localStorage.setItem('rememberMe', 'true');
                            localStorage.setItem('userEmail', email);
                        } else {
                            localStorage.removeItem('rememberMe');
                            localStorage.removeItem('userEmail');
                        }
                        
                        console.log('Login successful, redirecting...');
                        // 管理画面にリダイレクト
                        window.location.href = '/admin/app.html';
                    } else {
                        throw new Error('メールアドレスとパスワードを入力してください');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    loginError.textContent = error.message || 'ログインに失敗しました';
                    loginError.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'ログイン';
                }
            }, 100);
            
            return false;
        }

        // パスワード忘れ
        function handleForgotPassword(event) {
            event.preventDefault();
            alert('パスワードリセット機能は準備中です');
        }

        // ページ読み込み完了時の処理
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            // Remember Me の復元
            if (localStorage.getItem('rememberMe') === 'true') {
                const savedEmail = localStorage.getItem('userEmail');
                if (savedEmail) {
                    document.getElementById('email').value = savedEmail;
                    document.getElementById('rememberMe').checked = true;
                }
            }
            
            // フォームイベントの確実な設定
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', handleLogin);
                console.log('Form event listener added');
            }
            
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) {
                loginBtn.addEventListener('click', handleLogin);
                console.log('Button event listener added');
            }
        });
    </script>
</body>
</html>
