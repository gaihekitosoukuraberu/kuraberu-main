<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加盟店登録 - 確認画面</title>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #11998e;
            --success-color: #38ef7d;
            --danger-color: #ef4444;
            --bg-primary: #ffffff;
            --bg-secondary: #f7fafc;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.02), rgba(17, 153, 142, 0.02));
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-row {
            display: flex;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            flex: 0 0 180px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .info-value {
            flex: 1;
            color: var(--text-primary);
        }

        .missing-field {
            background: rgba(239, 68, 68, 0.05);
        }

        .missing-field .info-value {
            color: var(--danger-color);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .loading-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading-section.active {
            display: flex;
        }

        .loading-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .success-message.active {
            display: flex;
        }

        .success-content {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            max-width: 500px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--secondary-color), var(--success-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .area-summary {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .priority-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .manual-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--danger-color);
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .manual-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1rem;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>加盟店登録 - 確認画面</h1>
            <p style="color: var(--text-secondary);">入力内容をご確認の上、送信ボタンをクリックしてください</p>
        </div>

        <div class="section">
            <h2 class="section-title">
                <span>📋</span>
                <span>基本情報</span>
            </h2>
            <div id="basicInfoContent">
                <!-- 動的に生成 -->
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">
                <span>📍</span>
                <span>対応エリア</span>
            </h2>
            <div id="areaContent">
                <!-- 動的に生成 -->
            </div>
        </div>

        <div class="button-group">
            <button type="button" class="btn btn-secondary" onclick="goBack()">
                <span>←</span>
                <span>戻る</span>
            </button>
            <button type="button" class="btn btn-primary" id="submitBtn" onclick="submitRegistration()">
                <span>送信する</span>
                <span>→</span>
            </button>
        </div>
    </div>

    <!-- ローディング表示 -->
    <div id="loadingSection" class="loading-section">
        <div class="loading-content">
            <div class="spinner"></div>
            <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">送信中...</h3>
            <p style="color: var(--text-secondary);" id="loadingText">しばらくお待ちください</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <!-- 成功メッセージ -->
    <div id="successMessage" class="success-message">
        <div class="success-content">
            <div class="success-icon">✓</div>
            <h2 style="color: var(--text-primary); margin-bottom: 1rem;">登録完了</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                加盟店登録が正常に完了しました。<br>
                ご登録ありがとうございました。
            </p>
        </div>
    </div>

    <script>
        let allData = {};

        // 現在のGAS URL（getConfigが失敗した場合のフォールバック）
        // 修正済みnotify.jsデプロイ
        const CURRENT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcoZ-RuKshpWdOrANi6AzdsaYd0mQMVbVRP2PVnnP90HwsMdrHF8oFzd8wh-Z7lZxdMw/exec'; // プロパティGAS_WEBAPP_URLと一致
        let cachedGasUrl = null;
        
        // GAS URLを直接返す（最新デプロイURL）
        async function getGasUrl() {
            // プロパティGAS_WEBAPP_URLと一致する最新URLを直接使用
            cachedGasUrl = CURRENT_GAS_URL;
            console.log('✅ 最新デプロイURL使用:', cachedGasUrl);
            return cachedGasUrl;
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            generateConfirmationContent();
        });

        function loadAllData() {
            try {
                // 基本情報
                const basicData = localStorage.getItem('franchiseBasicData');
                if (!basicData) {
                    alert('基本情報が見つかりません。最初からやり直してください。');
                    window.location.href = '01_basic_info.html';
                    return false;
                }

                // エリア選択
                const areaData = localStorage.getItem('franchiseAreaSelections');
                if (!areaData) {
                    alert('エリア選択が見つかりません。エリア選択ページから設定してください。');
                    window.location.href = '02_area_selection.html';
                    return false;
                }

                allData = {
                    basic: JSON.parse(basicData),
                    areas: JSON.parse(areaData)
                };

                return true;
            } catch (error) {
                console.error('データ読み込みエラー:', error);
                return false;
            }
        }

        function generateConfirmationContent() {
            generateBasicInfoContent();
            generateAreaContent();
        }

        function generateBasicInfoContent() {
            const container = document.getElementById('basicInfoContent');
            const basic = allData.basic || {};

            let content = '';
            const fields = [
                { key: 'legalName', label: '会社名' },
                { key: 'legalNameKana', label: '会社名カナ' },
                { key: 'representative', label: '代表者名' },
                { key: 'representativeKana', label: '代表者カナ' },
                { key: 'postalCode', label: '郵便番号' },
                { key: 'address', label: '住所' },
                { key: 'phone', label: '電話番号' },
                { key: 'websiteUrl', label: 'ウェブサイトURL' },
                { key: 'employees', label: '従業員数' },
                { key: 'revenue', label: '売上規模' },
                { key: 'billingEmail', label: '請求用メールアドレス' },
                { key: 'salesEmail', label: '営業用メールアドレス' },
                { key: 'salesPersonName', label: '営業担当者氏名' },
                { key: 'salesPersonContact', label: '営業担当者連絡先' },
                { key: 'propertyTypes', label: '対応物件種別' },
                { key: 'constructionAreas', label: '施工箇所' },
                { key: 'specialServices', label: '特殊対応項目' },
                { key: 'tradeName', label: '屋号' },
                { key: 'tradeNameKana', label: '屋号カナ' },
                { key: 'establishedDate', label: '設立年月' },
                { key: 'companyPR', label: '特徴・PR文' }
            ];

            fields.forEach(field => {
                let value = basic[field.key] || '';
                
                // 配列の場合は文字列に変換
                if (Array.isArray(value)) {
                    value = value.join(', ');
                }
                // オブジェクトの場合は文字列に変換
                else if (typeof value === 'object' && value !== null) {
                    value = JSON.stringify(value);
                }
                // 数値の場合は文字列に変換
                else if (typeof value === 'number') {
                    value = value.toString();
                }
                
                // 文字列でない場合は空文字列にする
                if (typeof value !== 'string') {
                    value = '';
                }
                
                const hasValue = value && value.trim() !== '';
                content += `
                    <div class="info-row ${!hasValue ? 'missing-field' : ''}">
                        <div class="info-label">${field.label}</div>
                        <div class="info-value">
                            ${hasValue ? value : `<input type="text" class="manual-input" data-field="${field.key}" placeholder="${field.label}を入力">`}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = content;

            // 手入力フィールドのイベントリスナー
            document.querySelectorAll('.manual-input').forEach(input => {
                input.addEventListener('blur', function() {
                    const field = this.getAttribute('data-field');
                    const value = this.value;
                    if (value) {
                        allData.basic[field] = value;
                        localStorage.setItem('franchiseBasicData', JSON.stringify(allData.basic));
                    }
                });
            });
        }

        function generateAreaContent() {
            const container = document.getElementById('areaContent');
            const areas = allData.areas || [];

            if (areas.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">対応エリアが選択されていません</p>';
                return;
            }

            // 都道府県ごとにグループ化
            const areasByPrefecture = {};
            areas.forEach(area => {
                const pref = area.prefecture;
                if (!areasByPrefecture[pref]) {
                    areasByPrefecture[pref] = [];
                }
                areasByPrefecture[pref].push(area);
            });

            let content = '<div class="area-summary">';
            content += `<p style="margin-bottom: 1rem;">選択エリア数: <strong>${areas.length}件</strong></p>`;

            Object.keys(areasByPrefecture).forEach(prefecture => {
                const prefAreas = areasByPrefecture[prefecture];
                const priorityCount = prefAreas.filter(a => a.isPriority).length;
                
                content += `
                    <div style="margin-bottom: 1rem;">
                        <h4 style="color: var(--text-primary); margin-bottom: 0.5rem;">
                            ${prefecture}
                            ${priorityCount > 0 ? `<span class="priority-badge">優先 ${priorityCount}件</span>` : ''}
                        </h4>
                        <div style="color: var(--text-secondary); font-size: 0.875rem;">
                `;

                // 市区町村をグループ化
                const citiesMap = {};
                prefAreas.forEach(area => {
                    if (!citiesMap[area.city]) {
                        citiesMap[area.city] = [];
                    }
                    citiesMap[area.city].push(area);
                });

                Object.keys(citiesMap).forEach(city => {
                    const cityAreas = citiesMap[city];
                    const townCount = cityAreas.reduce((sum, a) => sum + (a.towns?.length || 0), 0);
                    content += `${city}`;
                    if (townCount > 0) {
                        content += ` (${townCount}地域)`;
                    }
                    content += '、';
                });

                content = content.slice(0, -1); // 最後のカンマを削除
                content += '</div></div>';
            });

            content += '</div>';
            container.innerHTML = content;
        }

        function goBack() {
            window.location.href = '02_area_selection.html';
        }

        // プログレスバー更新
        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
            if (text) {
                document.getElementById('loadingText').textContent = text;
            }
        }

        // 超圧縮版一括送信（既存アクションを使用）
        async function submitRegistration() {
            const submitBtn = document.getElementById('submitBtn');
            const loadingSection = document.getElementById('loadingSection');
            const successMessage = document.getElementById('successMessage');

            try {
                submitBtn.disabled = true;
                loadingSection.classList.add('active');
                updateProgress(0, 'データ準備中...');

                const gasUrl = await getGasUrl();
                
                // 送信データを準備
                const registrationData = {
                    ...allData.basic,
                    areas: allData.areas,
                    timestamp: new Date().toISOString()
                };

                console.log('📤 超圧縮送信開始');
                console.log('📦 基本情報:', allData.basic);
                console.log('📍 エリア数:', allData.areas ? allData.areas.length : 0, '件');
                
                // ========== 超圧縮データ作成 ==========
                updateProgress(20, 'データを圧縮中...');
                
                // エリアデータを都道府県別に集計
                let areasSummary = '';
                let priorityAreas = [];
                
                if (registrationData.areas && registrationData.areas.length > 0) {
                    // 都道府県別にカウント
                    const prefectureCount = {};
                    registrationData.areas.forEach(area => {
                        const pref = area.prefecture || '';
                        if (pref) {
                            prefectureCount[pref] = (prefectureCount[pref] || 0) + 1;
                        }
                        
                        // 優先エリアを別途収集
                        if (area.isPriority) {
                            priorityAreas.push(area.city + '(' + area.prefecture + ')');
                        }
                    });
                    
                    // 都道府県(件数)の形式で作成
                    areasSummary = Object.keys(prefectureCount).map(pref => {
                        return pref + '(' + prefectureCount[pref] + ')';
                    }).join(',');
                }
                
                // 超圧縮版データ（既存のsubmitFranchiseRegistrationアクション用）
                const ultraCompressedData = {
                    action: 'submitFranchiseRegistration',
                    // 極限圧縮：最小限でも全データ識別可能
                    ln: (registrationData.legalName || '').substring(0, 15),
                    lk: (registrationData.legalNameKana || '').substring(0, 15),
                    rp: (registrationData.representative || '').substring(0, 10),
                    rk: (registrationData.representativeKana || '').substring(0, 10),
                    pc: registrationData.postalCode || '',
                    ad: (registrationData.address || '').substring(0, 25),
                    ph: Array.isArray(registrationData.phone) ? 
                        registrationData.phone[0].replace(/-/g, '').substring(0, 11) : 
                        (registrationData.phone || '').replace(/-/g, '').substring(0, 11),
                    web: (registrationData.websiteUrl || '').substring(0, 30),
                    emp: (registrationData.employees || '').substring(0, 5),
                    rev: (registrationData.revenue || '').substring(0, 8),
                    bem: (registrationData.billingEmail || '').substring(0, 25),
                    sem: (registrationData.salesEmail || '').substring(0, 25),
                    spn: (registrationData.salesPersonName || '').substring(0, 10),
                    spc: Array.isArray(registrationData.salesPersonContact) ? 
                        registrationData.salesPersonContact[0].replace(/-/g, '').substring(0, 11) :
                        (registrationData.salesPersonContact || '').replace(/-/g, '').substring(0, 11),
                    // 数値のみで圧縮
                    pt: Array.isArray(registrationData.propertyTypes) ? 
                        registrationData.propertyTypes.length : (registrationData.propertyTypes ? '1' : '0'),
                    ca: Array.isArray(registrationData.constructionAreas) ? 
                        registrationData.constructionAreas.length : (registrationData.constructionAreas ? '1' : '0'),
                    ss: Array.isArray(registrationData.specialServices) ? 
                        registrationData.specialServices.length : (registrationData.specialServices ? '1' : '0'),
                    ba: (registrationData.buildingAgeRange || '').substring(0, 10),
                    tn: (registrationData.tradeName || '').substring(0, 8),
                    tk: (registrationData.tradeNameKana || '').substring(0, 8),
                    // 支店情報を圧縮（branches配列から生成）
                    bi: Array.isArray(registrationData.branches) ? 
                        registrationData.branches.map(b => b.branchName || '').slice(0, 3).join(',').substring(0, 20) :
                        (registrationData.branchInfo || '').substring(0, 20),
                    ed: (registrationData.establishedDate || '').replace(/年|月/g, '/').replace(/日/g, '').substring(0, 8),
                    cp: (registrationData.companyPR || '').substring(0, 30),
                    ac: areasSummary, // 都道府県別集計: 千葉(36),東京(46)等
                    pa: priorityAreas.slice(0, 3).join(','), // 優先エリア: 富里市(千葉県),匝瑳市(千葉県)等 最大3件
                    ts: Date.now()
                };
                
                // URLエンコードしたサイズを確認
                const testParams = new URLSearchParams();
                testParams.append('callback', 'test');
                Object.keys(ultraCompressedData).forEach(key => {
                    const value = ultraCompressedData[key];
                    if (value !== undefined && value !== null && value !== '') {
                        testParams.append(key, String(value));
                    }
                });
                const estimatedUrl = `${gasUrl}?${testParams}`;
                console.log('📏 推定URL長:', estimatedUrl.length, '文字');
                
                // URL長チェックのみ（対策は削除）
                if (estimatedUrl.length > 2000) {
                    console.warn('⚠️ URL長が2000文字を超えています:', estimatedUrl.length, '文字');
                }
                
                updateProgress(50, '登録データを送信中...');
                
                // 一括送信（既存のsubmitFranchiseRegistrationアクションを使用）
                let result;
                try {
                    result = await sendViaJSONP(gasUrl, ultraCompressedData);
                    console.log('📨 送信結果:', result);
                } catch (sendError) {
                    console.error('❌ 送信エラー:', sendError);
                    
                    // さらに圧縮して再試行
                    console.log('🔄 最小データで再試行');
                    const minimalData = {
                        action: 'submitFranchiseRegistration',
                        ln: (registrationData.legalName || '').substring(0, 12),
                        lk: (registrationData.legalNameKana || '').substring(0, 12),
                        rp: (registrationData.representative || '').substring(0, 8),
                        rk: (registrationData.representativeKana || '').substring(0, 8),
                        pc: registrationData.postalCode || '',
                        ad: (registrationData.address || '').substring(0, 20),
                        ph: Array.isArray(registrationData.phone) ? 
                            registrationData.phone[0].replace(/-/g, '').substring(0, 11) : 
                            (registrationData.phone || '').replace(/-/g, '').substring(0, 11),
                        web: (registrationData.websiteUrl || '').substring(0, 25),
                        emp: (registrationData.employees || '').substring(0, 3),
                        rev: (registrationData.revenue || '').substring(0, 5),
                        bem: (registrationData.billingEmail || '').substring(0, 20),
                        sem: (registrationData.salesEmail || '').substring(0, 20),
                        spn: (registrationData.salesPersonName || '').substring(0, 8),
                        spc: Array.isArray(registrationData.salesPersonContact) ? 
                            registrationData.salesPersonContact[0].replace(/-/g, '').substring(0, 11) :
                            (registrationData.salesPersonContact || '').replace(/-/g, '').substring(0, 11),
                        // 数値のみ
                        pt: Array.isArray(registrationData.propertyTypes) ? 
                            registrationData.propertyTypes.length : '0',
                        ca: Array.isArray(registrationData.constructionAreas) ? 
                            registrationData.constructionAreas.length : '0',
                        ss: Array.isArray(registrationData.specialServices) ? 
                            registrationData.specialServices.length : '0',
                        ba: (registrationData.buildingAgeRange || '').substring(0, 8),
                        tn: (registrationData.tradeName || '').substring(0, 6),
                        tk: (registrationData.tradeNameKana || '').substring(0, 6),
                        bi: Array.isArray(registrationData.branches) ? 
                            registrationData.branches.map(b => b.branchName || '').slice(0, 3).join(',').substring(0, 15) :
                            (registrationData.branchInfo || '').substring(0, 15),
                        ed: (registrationData.establishedDate || '').replace(/年|月/g, '/').substring(0, 6),
                        cp: (registrationData.companyPR || '').substring(0, 25),
                        ac: areasSummary, // 都道府県別集計
                        pa: priorityAreas.slice(0, 3).join(','), // 優先エリア最大3件
                        ts: Date.now()
                    };
                    
                    try {
                        result = await sendViaJSONP(gasUrl, minimalData);
                        console.log('✅ 最小データ送信成功');
                    } catch (fallbackError) {
                        throw new Error('データ送信に失敗しました: ' + fallbackError.message);
                    }
                }
                
                if (!result) {
                    throw new Error('登録に失敗しました - レスポンスなし');
                }
                
                updateProgress(100, '完了！');
                
                // 成功画面表示
                loadingSection.classList.remove('active');
                successMessage.classList.add('active');
                
                // データをクリア
                localStorage.removeItem('franchiseBasicData');
                localStorage.removeItem('franchiseAreaSelections');
                
                // 結果表示
                const successContent = document.querySelector('.success-content p');
                if (result.franchiseId) {
                    successContent.innerHTML += `<br><strong>加盟店ID: ${result.franchiseId}</strong>`;
                }
                if (result.message) {
                    successContent.innerHTML += `<br>${result.message}`;
                }

            } catch (error) {
                loadingSection.classList.remove('active');
                submitBtn.disabled = false;
                console.error('送信エラー:', error);
                alert('送信中にエラーが発生しました: ' + error.message);
            }
        }

        // JSONP送信（改善版）
        function sendViaJSONP(url, data) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const callbackName = 'gasCallback_' + Date.now();
                
                // コールバック関数を設定
                window[callbackName] = function(result) {
                    console.log('📨 レスポンス受信:', result);
                    document.head.removeChild(script);
                    delete window[callbackName];
                    
                    // 結果がない場合でも成功として扱う
                    if (!result) {
                        result = {success: true};
                    }
                    resolve(result);
                };
                
                // URLパラメータを構築
                const params = new URLSearchParams();
                params.append('callback', callbackName);
                Object.keys(data).forEach(key => {
                    const value = data[key];
                    if (value !== undefined && value !== null) {
                        params.append(key, String(value));
                    }
                });
                
                script.src = `${url}?${params}`;
                
                console.log('📏 URL長:', script.src.length, '文字');
                
                // 長すぎる場合は警告
                if (script.src.length > 8000) {
                    console.warn('⚠️ URL長が8000文字を超えています。送信が失敗する可能性があります。');
                }
                
                script.onerror = (error) => {
                    console.error('❌ スクリプトエラー:', error);
                    document.head.removeChild(script);
                    delete window[callbackName];
                    reject(new Error('通信エラー'));
                };
                
                document.head.appendChild(script);
                
                // タイムアウト設定（15秒に延長）
                setTimeout(() => {
                    if (window[callbackName]) {
                        console.warn('⏱️ リクエストタイムアウト');
                        document.head.removeChild(script);
                        delete window[callbackName];
                        reject(new Error('タイムアウト'));
                    }
                }, 15000); // 15秒
            });
        }
    </script>
