<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対応エリア選択 - 外壁塗装くらべるAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- config.js削除 -->
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --card-shadow: 0 10px 40px rgba(0,0,0,0.1);
            --card-shadow-hover: 0 20px 60px rgba(0,0,0,0.15);
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --text-primary: #1a202c;
            --text-secondary: #718096;
            --bg-primary: #ffffff;
            --bg-secondary: #f7fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ヘッダー */
        .header {
            background: var(--primary-gradient);
            padding: 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            pointer-events: none;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            font-weight: 300;
        }

        /* プログレスバー */
        .progress-container {
            max-width: 800px;
            margin: -1rem auto 3rem;
            padding: 0 2rem;
            position: relative;
            z-index: 10;
        }

        .progress-card {
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }

        .step-circle.completed {
            background: var(--success-gradient);
            color: white;
        }

        .step-circle.active {
            background: var(--primary-gradient);
            color: white;
        }

        .step-circle.pending {
            background: #e2e8f0;
            color: var(--text-secondary);
        }

        .step-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .step-line {
            position: absolute;
            top: 20px;
            left: 50%;
            right: -50%;
            height: 2px;
            background: #e2e8f0;
            z-index: -1;
        }

        .step-line.completed {
            background: var(--success-gradient);
        }

        /* メインコンテンツ */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .area-selection-card {
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .card-description {
            font-size: 1rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* エリア選択システム専用スタイル */
        .area-selection-system {
            max-width: 100%;
            margin: 1rem 0;
        }
        
        .area-level {
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.5rem;
            background: white;
        }
        
        .area-level.hidden {
            display: none;
        }
        
        .area-level-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        /* 都道府県別セクションスタイル */
        .prefecture-section {
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            overflow: hidden;
        }

        .prefecture-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(159, 122, 234, 0.1));
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prefecture-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .prefecture-all-select {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .prefecture-all-select:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .prefecture-cities {
            padding: 1.5rem;
        }

        /* ドラッグ選択対応 */
        .city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
            user-select: none;
        }

        .city-checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            background: white;
            position: relative;
        }

        .city-checkbox-label:hover {
            background: rgba(102, 126, 234, 0.05);
            border-color: #667eea;
        }

        .city-checkbox-label.dragging {
            background: rgba(102, 126, 234, 0.1);
            transform: scale(0.98);
        }

        .city-checkbox-label.selected {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }
        
        .area-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .area-checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            background: white;
        }
        
        .area-checkbox-label:hover {
            background: rgba(102, 126, 234, 0.05);
            border-color: #667eea;
        }
        
        .town-checkbox-label {
            background: rgba(248, 250, 252, 0.8);
            border-color: #cbd5e0;
            font-size: 0.8rem;
        }
        
        .town-checkbox-label:hover {
            background: rgba(102, 126, 234, 0.03);
        }
        
        .selected-areas-display {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(159, 122, 234, 0.05));
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
        }
        
        .selected-areas-display h4 {
            margin-bottom: 1rem;
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .selected-areas-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .selected-area-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            border: 1px solid #667eea;
            border-radius: 20px;
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .selected-area-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .selected-area-item.priority-selected {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }

        .selected-area-item.priority-selected:hover {
            background: #dc2626;
            border-color: #dc2626;
        }
        
        .area-name {
            font-weight: 500;
        }

        /* 詳細ボタンのスタイル */
        .town-detail-btn {
            margin-left: auto;
            padding: 0.25rem 0.5rem;
            background: #f8fafc;
            color: #cbd5e0;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .town-detail-btn:hover {
            background: #f1f5f9;
            color: #9ca3af;
            border-color: #cbd5e0;
        }
        
        /* 町域選択モーダル */
        .town-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .town-modal.hidden {
            display: none;
        }
        
        .town-modal-content {
            background: white;
            border-radius: 12px;
            max-width: 80%;
            max-height: 80%;
            width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .town-modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary-gradient);
            color: white;
        }
        
        .town-modal-header h3 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .town-modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        
        .town-modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .town-modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        
        .town-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
        }
        
        .town-checkbox-label-modal {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.8rem;
            background: #f8fafc;
        }
        
        .town-checkbox-label-modal:hover {
            background: rgba(102, 126, 234, 0.05);
            border-color: #667eea;
        }
        
        .town-modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }
        
        .town-modal-actions {
            display: flex;
            gap: 0.75rem;
        }
        
        .town-select-all-btn, .town-deselect-all-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #667eea;
            border-radius: 6px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        
        .town-select-all-btn:hover, .town-deselect-all-btn:hover {
            background: #667eea;
            color: white;
        }

        .remove-area-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .remove-area-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ナビゲーションボタン */
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-secondary);
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--card-shadow);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* チェックボックススタイル */
        .checkmark {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            position: relative;
            transition: all 0.2s ease;
        }

        input[type="checkbox"]:checked + .checkmark {
            background: var(--primary-gradient);
            border-color: #667eea;
        }

        input[type="checkbox"]:checked + .checkmark::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            width: 18px;
            height: 18px;
            margin: 0;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .main-container {
                padding: 0 1rem 2rem;
            }

            .area-selection-card {
                padding: 1.5rem;
            }

            .area-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.5rem;
            }

            .navigation-buttons {
                flex-direction: column;
                gap: 1rem;
            }

            .btn {
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <header class="header">
        <div class="header-content">
            <h1>🏢 対応エリア選択</h1>
            <p>お客様に提供できるサービスエリアを詳しく設定してください</p>
        </div>
    </header>

    <!-- プログレスバー -->
    <div class="progress-container">
        <div class="progress-card">
            <div class="progress-steps">
                <div class="progress-step">
                    <div class="step-circle completed">✓</div>
                    <div class="step-label">基本情報</div>
                </div>
                <div class="progress-step">
                    <div class="step-circle active">2</div>
                    <div class="step-label">対応エリア</div>
                    <div class="step-line"></div>
                </div>
                <div class="progress-step">
                    <div class="step-circle pending">3</div>
                    <div class="step-label">確認</div>
                </div>
            </div>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="main-container">
        <div class="area-selection-card">
            <h2 class="card-title">🗾 対応エリアの詳細設定</h2>
            <p class="card-description">
                都道府県から市区町村、さらに詳細な町域まで指定できます。<br>
                お客様からの依頼に対して確実に対応できるエリアのみを選択してください。
            </p>

            <!-- エリア選択システム -->
            <div class="area-selection-system">
                <!-- レベル1: 都道府県 -->
                <div class="area-level" id="prefectureLevel">
                    <h4 class="area-level-title">🗾 都道府県選択（最大5つまで）</h4>
                    <div class="area-grid" id="prefectureGrid">
                        <!-- 動的生成 -->
                    </div>
                </div>
                
                <!-- レベル2: 市区町村（都道府県別セクション） -->
                <div class="area-level hidden" id="cityLevel">
                    <h4 class="area-level-title">🏙️ 市区町村選択</h4>
                    <div id="prefectureSections">
                        <!-- 都道府県別セクションが動的生成される -->
                    </div>
                </div>
                
                <!-- 選択済みエリア表示 -->
                <div class="selected-areas-display" id="selectedAreasDisplay">
                    <h4>✅ 優先対応エリア選択</h4>
                    <p style="font-size: 0.9rem; color: #718096; margin-bottom: 1rem;">💡 選択済み対応エリアから特に優先的に案件を流入させたいエリアを最大3つまで選択してください</p>
                    <div class="selected-areas-list" id="selectedAreasList">
                        <p class="no-selection">まだエリアが選択されていません</p>
                    </div>
                    <div class="area-count-info">
                        <span id="selectedAreaCount">0</span> エリア選択済み
                        <span id="priorityAreaCount" style="margin-left: 1rem; color: #ef4444;"></span>
                    </div>
                </div>
            </div>

            <!-- ナビゲーションボタン -->
            <div class="navigation-buttons">
                <button onclick="goBackToPreviousPage()" class="btn btn-secondary">
                    ← 前のページに戻る
                </button>
                <button id="nextPageBtn" class="btn btn-primary" onclick="proceedToNextPage()" disabled>
                    確認画面へ進む →
                </button>
            </div>
        </div>
    </div>

    <!-- 町域選択モーダル -->
    <div id="townModal" class="town-modal hidden">
        <div class="town-modal-content">
            <div class="town-modal-header">
                <h3 id="townModalTitle">町域選択</h3>
                <button class="town-modal-close" onclick="closeTownModal()">&times;</button>
            </div>
            <div class="town-modal-body">
                <div id="townModalGrid" class="town-grid">
                    <!-- 町域チェックボックスが動的生成される -->
                </div>
            </div>
            <div class="town-modal-footer">
                <div class="town-modal-actions">
                    <button class="town-select-all-btn" onclick="selectAllTownsInModal()">すべて選択</button>
                    <button class="town-deselect-all-btn" onclick="deselectAllTownsInModal()">すべて解除</button>
                </div>
                <div id="townSelectionCount">0個選択済み</div>
            </div>
        </div>
    </div>

    <script>
        let areaData = null;
        let selectedAreas = [];
        let selectedPrefectures = new Set();
        let isDragging = false;
        let dragMode = null; // 'select' or 'deselect'
        let priorityAreas = new Set(); // 優先エリアを管理

        /**
         * ページ初期化
         */
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 エリア選択ページ初期化開始');
            
            // 編集モード検知
            const urlParams = new URLSearchParams(window.location.search);
            const isEditMode = urlParams.get('editMode') === 'true' || localStorage.getItem('editMode') === 'true';
            const isFromConfirmation = localStorage.getItem('fromConfirmation') === 'true';
            const isReturnToConfirmation = localStorage.getItem('returnToConfirmation') === 'true';
            const preserveAreaData = localStorage.getItem('preserveAreaData') === 'true';
            
            if (isEditMode && isFromConfirmation) {
                console.log('✏️ 編集モード: 確認画面からエリア編集で戻りました');
                
                // 編集モードフラグをクリア
                localStorage.removeItem('editMode');
                localStorage.removeItem('fromConfirmation');
            } else if (isReturnToConfirmation) {
                console.log('🔄 確認画面からの戻り: エリア選択データを保持します');
                // 確認画面からの戻りの場合はデータを保持
            } else if (preserveAreaData) {
                console.log('💾 詳細画面からの再訪問: エリア選択データを保持します');
                // 詳細画面からの遷移の場合はデータを保持
                localStorage.removeItem('preserveAreaData'); // フラグをクリア
            } else if (!isEditMode) {
                // 通常の新規アクセス時のみエリアデータをクリア
                console.log('🗑️ 通常アクセス: エリアデータをクリア');
                localStorage.removeItem('franchiseAreaSelections');
            }
            
            console.log('🔍 LocalStorage確認:', {
                basicData: localStorage.getItem('franchiseBasicData'),

        /**
         * 都道府県データを取得
         */
        async function loadAreaData() {
            // 都道府県のみの初期データを返す
            const initialData = {};
            prefectureList.forEach(prefecture => {
                initialData[prefecture] = {}; // 空のオブジェクトで初期化
            });
            return initialData;
        }

        /**
         * 都道府県選択時に市区町村データを動的読み込み
         */
        function loadCitiesForPrefecture(prefecture) {
            return cityData[prefecture] || {};
        }

        /**
         * 都道府県グリッド生成
         */
        function generatePrefectureGrid() {
            const container = document.getElementById('prefectureGrid');
            
            container.innerHTML = prefectureList.map(prefecture => `
                <label class="area-checkbox-label">
                    <input type="checkbox" value="${prefecture}" onchange="onPrefectureChange(this)" class="prefecture-checkbox">
                    <span class="checkmark"></span>
                    <span class="area-label">${prefecture}</span>
                </label>
            `).join('');
            
            console.log('✅ 都道府県グリッド生成完了:', prefectureList.length, '件');
        }

        /**
         * 都道府県選択変更ハンドラー
         */
        function onPrefectureChange(checkbox, skipLimitCheck = false) {
            const prefecture = checkbox.value;
            console.log(`🏛️ 都道府県選択変更: ${prefecture}, checked: ${checkbox.checked}`);
            
            if (checkbox.checked) {
                // 5個制限チェック（復元時はスキップ）
                if (!skipLimitCheck && selectedPrefectures.size >= 5) {
                    checkbox.checked = false;
                    showMessage('都道府県は最大5つまで選択可能です', 'error');
                    return;
                }
                
                selectedPrefectures.add(prefecture);
                console.log(`✅ ${prefecture}を選択済みに追加。現在の選択数: ${selectedPrefectures.size}`);
                
                // 市区町村レベルを表示
                const cityLevel = document.getElementById('cityLevel');
                cityLevel.classList.remove('hidden');
                console.log('✅ 市区町村レベルを表示');
                
                // 動的に市区町村データを読み込んで都道府県別セクション生成
                const cities = loadCitiesForPrefecture(prefecture);
                console.log(`🏙️ ${prefecture}の市区町村データ:`, Object.keys(cities || {}));
                generatePrefectureSection(prefecture, cities);
            } else {
                selectedPrefectures.delete(prefecture);
                
                // 該当する都道府県のセクションを削除
                removePrefectureSection(prefecture);
                
                // 該当する都道府県の選択をクリア
                clearPrefectureSelections(prefecture);
                
                // 都道府県が一つもなくなったら市区町村レベルを非表示
                if (selectedPrefectures.size === 0) {
                    const cityLevel = document.getElementById('cityLevel');
                    cityLevel.classList.add('hidden');
                }
            }
            
            updateSelectedAreasDisplay();
            updateNextButtonState();
        }

        /**
         * 都道府県別セクション生成
         */
        function generatePrefectureSection(prefecture, cities) {
            const container = document.getElementById('prefectureSections');
            
            // 既存のセクションがあれば削除（重複防止）
            removePrefectureSection(prefecture);
            
            // データがない場合のメッセージ
            if (!cities || Object.keys(cities).length === 0) {
                const noDataSection = document.createElement('div');
                noDataSection.className = 'prefecture-section';
                noDataSection.id = `section-${prefecture}`;
                noDataSection.innerHTML = `
                    <div class="prefecture-header">
                        <div class="prefecture-title">📍 ${prefecture}</div>
                    </div>
                    <div class="prefecture-cities">
                        <p style="color: #718096; text-align: center; padding: 1rem;">${prefecture}の詳細データを準備中です...</p>
                    </div>
                `;
                container.appendChild(noDataSection);
                return;
            }

            // 都道府県セクション作成
            const section = document.createElement('div');
            section.className = 'prefecture-section';
            section.id = `section-${prefecture}`;
            
            section.innerHTML = `
                <div class="prefecture-header">
                    <div class="prefecture-title">📍 ${prefecture}</div>
                    <button class="prefecture-all-select" onclick="selectAllInPrefecture('${prefecture}')">
                        ✓ ${prefecture === '京都府' ? '京都' : prefecture.replace('都', '').replace('府', '').replace('県', '')}全域
                    </button>
                </div>
                <div class="prefecture-cities">
                    <div class="city-grid" id="grid-${prefecture}">
                        <!-- 市区町村が動的生成される -->
                    </div>
                </div>
            `;
            
            container.appendChild(section);
            
            // 市区町村を生成
            const cityGrid = document.getElementById(`grid-${prefecture}`);
            Object.keys(cities).forEach(city => {
                const label = document.createElement('label');
                label.className = 'city-checkbox-label';
                label.dataset.prefecture = prefecture;
                label.dataset.city = city;
                
                const hasTowns = true; // 詳細ボタンを表示（動的読み込み対応）
                label.innerHTML = `
                    <input type="checkbox" value="${city}" onchange="onCityChange(this, '${prefecture}')" class="city-checkbox" data-prefecture="${prefecture}">
                    <span class="checkmark"></span>
                    ${city}
                    ${hasTowns ? `<button class="town-detail-btn" onclick="openTownModal('${prefecture}', '${city}')" type="button">詳細</button>` : ''}
                `;
                
                // ドラッグ選択イベント追加
                addDragSelectEvents(label);
                
                cityGrid.appendChild(label);
            });
        }

        /**
         * 都道府県セクション削除
         */
        function removePrefectureSection(prefecture) {
            const section = document.getElementById(`section-${prefecture}`);
            if (section) {
                section.remove();
            }
        }

        /**
         * 都道府県全域選択（トグル機能）
         */
        function selectAllInPrefecture(prefecture) {
            const cityGrid = document.getElementById(`grid-${prefecture}`);
            if (!cityGrid) return;
            
            const checkboxes = cityGrid.querySelectorAll('input[type="checkbox"]');
            const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
            const totalCount = checkboxes.length;
            
            // 全選択状態かどうか判定（80%以上選択されていたら全選択とみなす）
            const isAllSelected = checkedCount >= totalCount * 0.8;
            
            if (isAllSelected) {
                // 全解除
                checkboxes.forEach(checkbox => {
                    if (checkbox.checked) {
                        checkbox.checked = false;
                        onCityChange(checkbox, prefecture);
                    }
                });
                updateAllSelectButton(prefecture, false);
            } else {
                // 全選択
                checkboxes.forEach(checkbox => {
                    if (!checkbox.checked) {
                        checkbox.checked = true;
                        onCityChange(checkbox, prefecture);
                    }
                });
                updateAllSelectButton(prefecture, true);
            }
        }

        /**
         * 全域ボタンの表示更新
         */
        function updateAllSelectButton(prefecture, isAllSelected) {
            const button = document.querySelector(`button[onclick="selectAllInPrefecture('${prefecture}')"]`);
            if (!button) return;
            
            const prefectureName = prefecture === '京都府' ? '京都' : prefecture.replace('都', '').replace('府', '').replace('県', '');
            
            if (isAllSelected) {
                button.innerHTML = `✗ ${prefectureName}全域解除`;
                button.style.background = '#ef4444';
            } else {
                button.innerHTML = `✓ ${prefectureName}全域`;
                button.style.background = 'var(--primary-gradient)';
            }
        }

        /**
         * ドラッグ選択イベント追加
         */
        function addDragSelectEvents(label) {
            let startTime = 0;
            let startPos = { x: 0, y: 0 };
            
            // マウスイベント
            label.addEventListener('mousedown', (e) => {
                startTime = Date.now();
                startPos = { x: e.clientX, y: e.clientY };
            });

            label.addEventListener('mouseup', (e) => {
                const endTime = Date.now();
                const endPos = { x: e.clientX, y: e.clientY };
                const duration = endTime - startTime;
                const distance = Math.sqrt(
                    Math.pow(endPos.x - startPos.x, 2) + 
                    Math.pow(endPos.y - startPos.y, 2)
                );
                
                // クリック判定: 300ms以内 & 移動距離5px以内
                if (duration < 300 && distance < 5) {
                    e.preventDefault();
                    const checkbox = label.querySelector('input[type="checkbox"]');
                    checkbox.checked = !checkbox.checked;
                    onCityChange(checkbox, checkbox.dataset.prefecture);
                }
            });

            // ドラッグ開始
            label.addEventListener('mousedown', (e) => {
                setTimeout(() => {
                    if (!isDragging) {
                        const rect = label.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                            const checkbox = label.querySelector('input[type="checkbox"]');
                            isDragging = true;
                            dragMode = checkbox.checked ? 'deselect' : 'select';
                            
                            checkbox.checked = !checkbox.checked;
                            onCityChange(checkbox, checkbox.dataset.prefecture);
                            label.classList.add('dragging');
                        }
                    }
                }, 150);
            });

            label.addEventListener('mouseenter', () => {
                if (isDragging) {
                    const checkbox = label.querySelector('input[type="checkbox"]');
                    const shouldCheck = dragMode === 'select';
                    
                    if (checkbox.checked !== shouldCheck) {
                        checkbox.checked = shouldCheck;
                        onCityChange(checkbox, checkbox.dataset.prefecture);
                    }
                    label.classList.add('dragging');
                }
            });

            label.addEventListener('mouseleave', () => {
                label.classList.remove('dragging');
            });

            // タッチイベント（スマホ対応）
            label.addEventListener('touchstart', (e) => {
                // スクロール中でない場合のみpreventDefaultを実行
                if (e.cancelable) {
                    e.preventDefault();
                }
                const checkbox = label.querySelector('input[type="checkbox"]');
                isDragging = true;
                dragMode = checkbox.checked ? 'deselect' : 'select';
                
                checkbox.checked = !checkbox.checked;
                onCityChange(checkbox, checkbox.dataset.prefecture);
                
                label.classList.add('dragging');
            }, { passive: false });

            label.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    // スクロール中でない場合のみpreventDefaultを実行
                    if (e.cancelable) {
                        e.preventDefault();
                    }
                    const touch = e.touches[0];
                    const element = document.elementFromPoint(touch.clientX, touch.clientY);
                    const targetLabel = element?.closest('.city-checkbox-label');
                    
                    if (targetLabel && targetLabel !== label) {
                        const checkbox = targetLabel.querySelector('input[type="checkbox"]');
                        const shouldCheck = dragMode === 'select';
                        
                        if (checkbox && checkbox.checked !== shouldCheck) {
                            checkbox.checked = shouldCheck;
                            onCityChange(checkbox, checkbox.dataset.prefecture);
                        }
                        targetLabel.classList.add('dragging');
                    }
                }
            }, { passive: false });
        }

        // グローバルドラッグ終了イベント
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                dragMode = null;
                document.querySelectorAll('.city-checkbox-label').forEach(label => {
                    label.classList.remove('dragging');
                });
            }
        });

        document.addEventListener('touchend', () => {
            if (isDragging) {
                isDragging = false;
                dragMode = null;
                document.querySelectorAll('.city-checkbox-label').forEach(label => {
                    label.classList.remove('dragging');
                });
            }
        });

        /**
         * 市区町村選択変更ハンドラー
         */
        function onCityChange(checkbox, prefecture) {
            const city = checkbox.value;
            
            if (checkbox.checked) {
                // エリアを選択済みリストに追加
                addAreaToSelection(prefecture, city);
            } else {
                // エリアを選択済みリストから削除
                removeAreaFromSelection(prefecture, city);
            }
            
            // 全域ボタンの状態を更新
            updateAllSelectButtonState(prefecture);
            
            updateSelectedAreasDisplay();
            updateNextButtonState();
        }

        /**
         * 全域ボタンの状態を自動更新
         */
        function updateAllSelectButtonState(prefecture) {
            const cityGrid = document.getElementById(`grid-${prefecture}`);
            if (!cityGrid) return;
            
            const checkboxes = cityGrid.querySelectorAll('input[type="checkbox"]');
            const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
            const totalCount = checkboxes.length;
            
            const isAllSelected = checkedCount >= totalCount * 0.8;
            updateAllSelectButton(prefecture, isAllSelected);
        }

        /**
         * エリアを選択済みリストに追加
         */
        function addAreaToSelection(prefecture, city) {
            const existingIndex = selectedAreas.findIndex(area => 
                area.prefecture === prefecture && area.city === city
            );
            
            if (existingIndex === -1) {
                selectedAreas.push({
                    prefecture: prefecture,
                    city: city,
                    towns: [] // 町域は後で設定
                });
            }
        }

        /**
         * エリアを選択済みリストから削除
         */
        function removeAreaFromSelection(prefecture, city) {
            selectedAreas = selectedAreas.filter(area => 
                !(area.prefecture === prefecture && area.city === city)
            );
        }

        /**
         * 都道府県の選択をクリア
         */
        function clearPrefectureSelections(prefecture) {
            // 該当都道府県の市区町村チェックをすべて外す
            const cityCheckboxes = document.querySelectorAll(`input[data-prefecture="${prefecture}"]`);
            cityCheckboxes.forEach(checkbox => {
                checkbox.checked = false;
            });
            
            // 選択済みリストからも削除
            selectedAreas = selectedAreas.filter(area => area.prefecture !== prefecture);
        }

        /**
         * 選択済みエリア表示更新
         */
        function updateSelectedAreasDisplay() {
            const selectedAreasList = document.getElementById('selectedAreasList');
            const selectedAreaCount = document.getElementById('selectedAreaCount');
            const priorityAreaCount = document.getElementById('priorityAreaCount');
            
            if (selectedAreas.length === 0) {
                selectedAreasList.innerHTML = '<p class="no-selection">まだエリアが選択されていません</p>';
                selectedAreaCount.textContent = '0';
                priorityAreaCount.textContent = '';
                return;
            }
            
            selectedAreasList.innerHTML = selectedAreas.map(area => {
                const areaKey = `${area.prefecture}:${area.city}`;
                const isPriority = priorityAreas.has(areaKey);
                return `
                    <div class="selected-area-item ${isPriority ? 'priority-selected' : ''}" onclick="togglePriorityArea('${area.prefecture}', '${area.city}')">
                        <span class="area-name">${area.city} (${area.prefecture})</span>
                        <button class="remove-area-btn" onclick="removeSelectedArea('${area.prefecture}', '${area.city}'); event.stopPropagation();" title="削除">×</button>
                    </div>
                `;
            }).join('');
            
            selectedAreaCount.textContent = selectedAreas.length;
            
            // 優先エリア数表示
            const priorityCount = priorityAreas.size;
            if (priorityCount > 0) {
                priorityAreaCount.textContent = `| 優先エリア: ${priorityCount}/3`;
            } else {
                priorityAreaCount.textContent = '';
            }
        }

        /**
         * 優先エリアのトグル
         */
        function togglePriorityArea(prefecture, city) {
            const areaKey = `${prefecture}:${city}`;
            
            if (priorityAreas.has(areaKey)) {
                // 既に優先選択されている場合は解除
                priorityAreas.delete(areaKey);
            } else {
                // 優先選択されていない場合
                if (priorityAreas.size >= 3) {
                    // 3つ制限に達している場合は古いものを削除
                    const firstKey = priorityAreas.values().next().value;
                    priorityAreas.delete(firstKey);
                }
                priorityAreas.add(areaKey);
            }
            
            updateSelectedAreasDisplay();
        }

        /**
         * 選択済みエリアを削除
         */
        function removeSelectedArea(prefecture, city) {
            // チェックボックスも外す
            const checkbox = document.querySelector(`input[value="${city}"][data-prefecture="${prefecture}"]`);
            if (checkbox) {
                checkbox.checked = false;
            }
            
            // 優先エリアからも削除
            const areaKey = `${prefecture}:${city}`;
            priorityAreas.delete(areaKey);
            
            // リストからも削除
            removeAreaFromSelection(prefecture, city);
            updateSelectedAreasDisplay();
            updateNextButtonState();
        }

            } else {

                nextBtn.textContent = '確認画面へ進む →';
            }
        }

        /**
         * 前回の選択を復元
         */
        function restorePreviousSelections() {
            const savedData = localStorage.getItem('franchiseAreaSelections');
            console.log('🔍 復元処理開始');
            console.log('📦 localStorage franchiseAreaSelections:', savedData);
            console.log('📍 現在のselectedAreas before restore:', selectedAreas);
            console.log('🎯 現在のpriorityAreas before restore:', Array.from(priorityAreas));
            
            if (savedData) {
                try {
                    const savedAreasWithPriority = JSON.parse(savedData);
                    
                    // 通常のエリア配列と優先エリアSetを再構築
                    selectedAreas = savedAreasWithPriority.map(area => ({
                        prefecture: area.prefecture,
                        city: area.city
                    }));
                    
                    // 優先エリアSetをクリアして再構築
                    priorityAreas.clear();
                    savedAreasWithPriority.forEach(area => {
                        if (area.isPriority) {
                            const areaKey = `${area.prefecture}:${area.city}`;
                            priorityAreas.add(areaKey);
                        }
                    });
                    
                    // 復元時は制限チェックをスキップ
                    console.log('🔄 エリア選択を復元中:', selectedAreas.length, '件');
                    console.log('🎯 優先エリア復元中:', priorityAreas.size, '件');
                    console.log('📋 復元データ詳細:', selectedAreas);
                    console.log('🎯 復元優先エリア詳細:', Array.from(priorityAreas));
                    
                    // チェックボックスの状態を復元
                    selectedAreas.forEach(area => {
                        // 都道府県チェックボックス（制限チェックをスキップ）
                        const prefCheckbox = document.querySelector(`input[value="${area.prefecture}"]`);
                        if (prefCheckbox) {
                            prefCheckbox.checked = true;
                            onPrefectureChange(prefCheckbox, true); // skipLimitCheck = true
                        }
                        
                        // 市区町村チェックボックス（少し遅延して設定）
                        setTimeout(() => {
                            const cityCheckbox = document.querySelector(`input[value="${area.city}"][data-prefecture="${area.prefecture}"]`);
                            if (cityCheckbox) {
                                cityCheckbox.checked = true;
                                
                                // 優先エリアの場合は優先表示も復元
                                const areaKey = `${area.prefecture}:${area.city}`;
                                if (priorityAreas.has(areaKey)) {
                                    const cityDiv = cityCheckbox.closest('.city-item');
                                    if (cityDiv) {
                                        cityDiv.classList.add('priority-selected');
                                        console.log('✅ 優先エリア復元:', areaKey);
                                    }
                                }
                            }
                        }, 100);
                    });
                    
                    // 優先エリア表示を更新（追加で）
                    setTimeout(() => {
                        // 優先エリア表示を強制的に更新
                        console.log('🎯 優先エリア表示を強制更新開始');
                        Array.from(priorityAreas).forEach(areaKey => {
                            const [prefecture, city] = areaKey.split(':');
                            console.log(`🎯 優先エリア強制更新: ${prefecture}:${city}`);
                            
                            // チェックボックスを探す
                            const cityCheckbox = document.querySelector(`input[value="${city}"][data-prefecture="${prefecture}"]`);
                            if (cityCheckbox) {
                                // 複数の方法で優先表示要素を探す
                                let priorityTarget = cityCheckbox.closest('.city-item') ||
                                                   cityCheckbox.closest('.area-item') ||
                                                   cityCheckbox.parentElement ||
                                                   cityCheckbox.closest('div');
                                
                                if (priorityTarget) {
                                    priorityTarget.classList.add('priority-selected');
                                    console.log('✅ 優先エリア表示更新成功:', areaKey);
                                } else {
                                    console.warn('⚠️ 優先エリア表示要素が見つかりません:', areaKey);
                                }
                            } else {
                                console.warn('⚠️ 優先エリアのチェックボックスが見つかりません:', areaKey);
                            }
                        });
                        
                        // さらに確実にするため、もう一度優先エリア処理を実行
                        setTimeout(() => {
                            console.log('🔄 優先エリア最終確認処理開始');
                            Array.from(priorityAreas).forEach(areaKey => {
                                const [prefecture, city] = areaKey.split(':');
                                // 全ての可能なセレクターでチェックボックス周辺要素を探す
                                const selectors = [
                                    `input[value="${city}"][data-prefecture="${prefecture}"]`,
                                    `input[data-city="${city}"][data-prefecture="${prefecture}"]`,
                                    `label:has(input[value="${city}"])`,
                                    `.city-item:has(input[value="${city}"])`,
                                    `.area-item:has(input[value="${city}"])`
                                ];
                                
                                let found = false;
                                selectors.forEach(selector => {
                                    try {
                                        const elements = document.querySelectorAll(selector);
                                        elements.forEach(element => {
                                            const container = element.closest('.city-item') ||
                                                            element.closest('.area-item') ||
                                                            element.closest('label') ||
                                                            element.parentElement;
                                            if (container) {
                                                container.classList.add('priority-selected');
                                                found = true;
                                                console.log(`✅ 最終確認で優先エリア復元: ${areaKey}`);
                                            }
                                        });
                                    } catch (e) {
                                        // セレクターエラーは無視
                                    }
                                });
                                
                                if (!found) {
                                    console.warn(`⚠️ 最終確認でも優先エリア要素が見つからない: ${areaKey}`);
                                }
                            });
                        }, 200);
                        
                        updateSelectedAreasDisplay();
                        updateNextButtonState();
                        console.log('✅ エリア選択・優先エリア復元完了');
                    }, 300); // 遅延を少し増やして確実にDOM構築完了を待つ
                    
                } catch (error) {
                    console.error('前回の選択復元エラー:', error);
                }
            }
        }

                }
            } catch (error) {
                console.error('❌ エリア選択データの保存エラー:', error);
            }
        }

        /**
         * メッセージ表示
         */
        function showMessage(message, type = 'info') {
            // 簡易メッセージ表示
            alert(message);
        }
    </script>
</body>
</html>
