<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運営本部システム - ログイン</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .login-button {
            width: 100%;
            padding: 12px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-button:hover {
            background: #b91c1c;
        }
        
        .login-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="title">外壁塗装くらべるAI<br>運営本部システム</h1>
        
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="email" placeholder="メールアドレスを入力">
        </div>
        
        <div class="form-group">
            <label>パスワード</label>
            <input type="password" id="password" placeholder="パスワードを入力">
        </div>
        
        <button class="login-button" id="loginBtn">ログイン</button>
    </div>

    <script>
        document.getElementById('loginBtn').onclick = function() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('メールアドレスとパスワードを入力してください');
                return;
            }
            
            this.disabled = true;
            this.textContent = 'ログイン中...';
            
            // 認証情報を保存
            localStorage.setItem('admin_token', 'token_' + new Date().getTime());
            localStorage.setItem('admin_user', JSON.stringify({
                email: email,
                name: '管理者',
                role: 'admin'
            }));
            
            // 1秒後にリダイレクト
            setTimeout(function() {
                window.location.href = '/admin/';
            }, 1000);
        };
    </script>
</body>
</html>
