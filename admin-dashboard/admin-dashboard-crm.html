<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件管理システム - CRM統合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-badge {
            transition: all 0.2s;
        }
        .case-row:hover {
            background-color: #f9fafb;
        }
        .quick-action-btn {
            transition: all 0.2s;
        }
        .quick-action-btn:hover {
            transform: scale(1.05);
        }
        .tab-active {
            background-color: white;
            color: #111827;
        }
        .tab-inactive {
            color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- ヘッダー -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold">案件管理システム CRM</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">
                        本日の進捗: <span class="font-semibold text-blue-600" id="completedToday">0</span> / <span class="font-semibold" id="totalToday">0</span> 件
                    </span>
                    <button class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        エクスポート
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- ビュー切り替えタブ -->
        <div class="mb-6">
            <div class="flex space-x-1 bg-gray-100 p-1 rounded-lg inline-flex">
                <button id="listViewBtn" class="px-4 py-2 rounded-md text-sm font-medium transition-all tab-active" onclick="switchView('list')">
                    <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                    リスト表示
                </button>
                <button id="crmViewBtn" class="px-4 py-2 rounded-md text-sm font-medium transition-all tab-inactive" onclick="switchView('crm')">
                    <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    CRM詳細
                </button>
            </div>
        </div>

        <!-- リストビュー -->
        <div id="listView" class="block">
            <!-- フィルターセクション -->
            <div class="bg-white rounded-lg shadow-sm p-4 mb-4">
                <div class="flex items-center space-x-4">
                    <input type="text" placeholder="検索..." class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" id="searchInput">
                    <select class="px-3 py-2 border border-gray-300 rounded-lg" id="statusFilter">
                        <option value="all">すべてのステータス</option>
                        <option value="新規">新規</option>
                        <option value="不在">不在</option>
                        <option value="再架電">再架電</option>
                        <option value="見込み">見込み</option>
                        <option value="配信中">配信中</option>
                        <option value="配信済">配信済</option>
                        <option value="アポ済">アポ済</option>
                        <option value="現調済">現調済</option>
                        <option value="見積提出済">見積提出済</option>
                        <option value="完了">完了</option>
                    </select>
                    <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                        フィルターをクリア
                    </button>
                </div>
            </div>

            <!-- 案件リストテーブル -->
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <input type="checkbox" class="rounded text-blue-600" id="selectAll">
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                ステータス
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                顧客名
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                電話番号
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                エリア
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                物件
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                紹介料
                            </th>
                            <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                                クイックアクション
                            </th>
                            <th class="px-3 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                                詳細
                            </th>
                        </tr>
                    </thead>
                    <tbody id="casesListBody" class="bg-white divide-y divide-gray-200">
                        <!-- 動的に生成される案件リスト -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- CRMビュー（初期非表示） -->
        <div id="crmView" class="hidden">
            <div class="bg-white rounded-lg shadow-sm">
                <!-- CRMヘッダー -->
                <div class="border-b px-6 py-4">
                    <div class="flex items-center justify-between">
                        <h2 class="text-xl font-semibold text-gray-900" id="crmCustomerName">顧客名</h2>
                        <div class="flex space-x-2">
                            <button onclick="previousCase()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-all">
                                ← 前の案件
                            </button>
                            <button onclick="nextCase()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-all">
                                次の案件 →
                            </button>
                        </div>
                    </div>
                </div>

                <!-- クイックアクションバー -->
                <div class="border-b px-6 py-4 bg-gray-50">
                    <div class="flex space-x-3">
                        <button onclick="quickAction('不在')" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 quick-action-btn">
                            不在
                        </button>
                        <button onclick="quickAction('再架電')" class="px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 quick-action-btn">
                            再架電
                        </button>
                        <button onclick="quickAction('アポ取得')" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 quick-action-btn">
                            アポ取得
                        </button>
                        <button onclick="quickAction('見積提出')" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 quick-action-btn">
                            見積提出
                        </button>
                        <button onclick="quickAction('失注')" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 quick-action-btn">
                            失注
                        </button>
                        <button onclick="quickAction('完了')" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 quick-action-btn">
                            完了
                        </button>
                    </div>
                </div>

                <!-- CRMコンテンツ -->
                <div class="p-6">
                    <!-- タブナビゲーション -->
                    <div class="border-b border-gray-200 mb-6">
                        <nav class="-mb-px flex space-x-8">
                            <button class="border-b-2 border-blue-500 py-2 px-1 text-sm font-medium text-blue-600" onclick="showCRMTab('info')">
                                基本情報
                            </button>
                            <button class="border-b-2 border-transparent py-2 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300" onclick="showCRMTab('history')">
                                通話履歴
                            </button>
                            <button class="border-b-2 border-transparent py-2 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300" onclick="showCRMTab('franchise')">
                                加盟店管理
                            </button>
                            <button class="border-b-2 border-transparent py-2 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300" onclick="showCRMTab('memo')">
                                メモ・備考
                            </button>
                        </nav>
                    </div>

                    <!-- 基本情報タブ -->
                    <div id="crmTabInfo" class="block">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <h3 class="text-lg font-medium text-gray-900 mb-4">顧客情報</h3>
                                <dl class="space-y-3">
                                    <div>
                                        <dt class="text-sm text-gray-500">氏名</dt>
                                        <dd class="text-gray-900 font-medium" id="crmName">-</dd>
                                    </div>
                                    <div>
                                        <dt class="text-sm text-gray-500">電話番号</dt>
                                        <dd class="text-gray-900 font-medium">
                                            <a href="#" id="crmPhone" class="text-blue-600 hover:text-blue-800">-</a>
                                            <button onclick="startCall()" class="ml-2 text-green-600 hover:text-green-700">
                                                📞 架電
                                            </button>
                                        </dd>
                                    </div>
                                    <div>
                                        <dt class="text-sm text-gray-500">メールアドレス</dt>
                                        <dd class="text-gray-900 font-medium" id="crmEmail">-</dd>
                                    </div>
                                    <div>
                                        <dt class="text-sm text-gray-500">住所</dt>
                                        <dd class="text-gray-900 font-medium" id="crmAddress">-</dd>
                                    </div>
                                </dl>
                            </div>
                            <div>
                                <h3 class="text-lg font-medium text-gray-900 mb-4">物件情報</h3>
                                <dl class="space-y-3">
                                    <div>
                                        <dt class="text-sm text-gray-500">物件タイプ</dt>
                                        <dd class="text-gray-900 font-medium" id="crmPropertyType">-</dd>
                                    </div>
                                    <div>
                                        <dt class="text-sm text-gray-500">階数</dt>
                                        <dd class="text-gray-900 font-medium" id="crmFloors">-</dd>
                                    </div>
                                    <div>
                                        <dt class="text-sm text-gray-500">築年数</dt>
                                        <dd class="text-gray-900 font-medium" id="crmAge">-</dd>
                                    </div>
                                    <div>
                                        <dt class="text-sm text-gray-500">希望工事</dt>
                                        <dd class="text-gray-900 font-medium" id="crmWorkItems">-</dd>
                                    </div>
                                </dl>
                            </div>
                        </div>
                    </div>

                    <!-- 通話履歴タブ -->
                    <div id="crmTabHistory" class="hidden">
                        <div class="space-y-4">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-medium text-gray-900">通話履歴</h3>
                                <button onclick="addCallLog()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                    + 通話記録を追加
                                </button>
                            </div>
                            <div id="callHistoryList" class="space-y-3">
                                <!-- 動的に生成される通話履歴 -->
                            </div>
                        </div>
                    </div>

                    <!-- 加盟店管理タブ -->
                    <div id="crmTabFranchise" class="hidden">
                        <div class="space-y-4">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-medium text-gray-900">加盟店ステータス管理</h3>
                                <button onclick="addFranchise()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                    + 加盟店を追加
                                </button>
                            </div>
                            <div id="franchiseList" class="space-y-3">
                                <!-- 動的に生成される加盟店リスト -->
                            </div>
                        </div>
                    </div>

                    <!-- メモ・備考タブ -->
                    <div id="crmTabMemo" class="hidden">
                        <div class="space-y-4">
                            <h3 class="text-lg font-medium text-gray-900 mb-4">メモ・備考</h3>
                            <textarea id="crmMemo" rows="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="メモを入力..."></textarea>
                            <div class="flex justify-end">
                                <button onclick="saveMemo()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                    保存
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 案件データ
        const casesData = {
            '001': {
                name: '田中太郎',
                nameKana: 'タナカタロウ',
                phone: '090-1234-5678',
                email: 'tanaka@example.com',
                address: '東京都渋谷区神宮前1-1-1',
                postalCode: '150-0001',
                propertyType: '戸建て',
                floors: '2階建て',
                age: '15年',
                area: '120㎡',
                workItems: ['外壁塗装', '屋根塗装'],
                status: '配信済',
                fee: 20000,
                memo: '',
                callHistory: [],
                franchiseStatuses: {
                    'franchise1': { name: 'A工務店', status: 'アポ済' },
                    'franchise2': { name: 'B塗装', status: '現調済' },
                    'franchise3': { name: 'C建設', status: '見積提出済' }
                }
            },
            '002': {
                name: '鈴木花子',
                nameKana: 'スズキハナコ',
                phone: '080-9876-5432',
                email: 'suzuki@example.com',
                address: '東京都新宿区新宿2-2-2',
                postalCode: '160-0022',
                propertyType: 'マンション',
                floors: '5階建て',
                age: '8年',
                area: '85㎡',
                workItems: ['外壁塗装', 'ベランダ防水'],
                status: '配信中',
                fee: 30000,
                memo: '',
                callHistory: [],
                franchiseStatuses: {
                    'franchise1': { name: 'D外装工業', status: '新規配信' }
                }
            },
            '003': {
                name: '佐藤一郎',
                nameKana: 'サトウイチロウ',
                phone: '070-5555-7777',
                email: 'sato@example.com',
                address: '東京都品川区南大井3-3-3',
                postalCode: '140-0013',
                propertyType: '戸建て',
                floors: '2階建て',
                age: '25年',
                area: '150㎡',
                workItems: ['屋根葺き替え', '外壁補修'],
                status: '見込み',
                fee: 20000,
                memo: '',
                callHistory: [],
                franchiseStatuses: {}
            }
        };

        let currentCaseId = '001';
        let currentView = 'list';

        // ステータスの色定義
        function getStatusColor(status) {
            const colorMap = {
                '新規': 'bg-blue-100 text-blue-700',
                '不在': 'bg-gray-100 text-gray-700',
                '再架電': 'bg-yellow-100 text-yellow-700',
                '見込み': 'bg-emerald-100 text-emerald-700',
                '配信中': 'bg-yellow-100 text-yellow-700',
                '配信済': 'bg-green-100 text-green-700',
                'アポ済': 'bg-emerald-100 text-emerald-700',
                '現調済': 'bg-emerald-100 text-emerald-700',
                '見積提出済': 'bg-emerald-100 text-emerald-700',
                '完了': 'bg-purple-100 text-purple-700',
                '失注': 'bg-red-100 text-red-700'
            };
            return colorMap[status] || 'bg-gray-100 text-gray-700';
        }

        // リストビューの初期化
        function initializeListView() {
            const tbody = document.getElementById('casesListBody');
            tbody.innerHTML = '';

            Object.entries(casesData).forEach(([caseId, caseData]) => {
                const row = document.createElement('tr');
                row.className = 'case-row cursor-pointer';
                row.innerHTML = `
                    <td class="px-3 py-4 whitespace-nowrap">
                        <input type="checkbox" class="rounded text-blue-600">
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(caseData.status)}">
                            ${caseData.status}
                        </span>
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${caseData.name}</div>
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap">
                        <a href="tel:${caseData.phone}" class="text-sm text-blue-600 hover:text-blue-800">
                            ${caseData.phone}
                        </a>
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-900">
                        ${caseData.postalCode}
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-900">
                        ${caseData.propertyType} ${caseData.floors}
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap text-sm font-medium text-emerald-600">
                        ¥${caseData.fee.toLocaleString()}
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap text-center">
                        <div class="flex justify-center space-x-1">
                            <button onclick="quickAction('不在', '${caseId}')" class="px-2 py-1 text-xs bg-gray-500 text-white rounded hover:bg-gray-600">
                                不在
                            </button>
                            <button onclick="quickAction('対応中', '${caseId}')" class="px-2 py-1 text-xs bg-yellow-500 text-white rounded hover:bg-yellow-600">
                                対応中
                            </button>
                            <button onclick="quickAction('完了', '${caseId}')" class="px-2 py-1 text-xs bg-green-500 text-white rounded hover:bg-green-600">
                                完了
                            </button>
                        </div>
                    </td>
                    <td class="px-3 py-4 whitespace-nowrap text-center">
                        <button onclick="openCRM('${caseId}')" class="text-blue-600 hover:text-blue-800">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            updateStatistics();
        }

        // 統計情報の更新
        function updateStatistics() {
            const total = Object.keys(casesData).length;
            const completed = Object.values(casesData).filter(c => c.status === '完了').length;
            
            document.getElementById('totalToday').textContent = total;
            document.getElementById('completedToday').textContent = completed;
        }

        // ビュー切り替え
        function switchView(view) {
            if (view === 'list') {
                document.getElementById('listView').classList.remove('hidden');
                document.getElementById('crmView').classList.add('hidden');
                document.getElementById('listViewBtn').classList.add('tab-active');
                document.getElementById('listViewBtn').classList.remove('tab-inactive');
                document.getElementById('crmViewBtn').classList.remove('tab-active');
                document.getElementById('crmViewBtn').classList.add('tab-inactive');
                currentView = 'list';
            } else {
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('crmView').classList.remove('hidden');
                document.getElementById('crmViewBtn').classList.add('tab-active');
                document.getElementById('crmViewBtn').classList.remove('tab-inactive');
                document.getElementById('listViewBtn').classList.remove('tab-active');
                document.getElementById('listViewBtn').classList.add('tab-inactive');
                currentView = 'crm';
                if (currentCaseId) {
                    loadCRMData(currentCaseId);
                }
            }
        }

        // CRM詳細を開く
        function openCRM(caseId) {
            currentCaseId = caseId;
            switchView('crm');
        }

        // CRMデータの読み込み
        function loadCRMData(caseId) {
            const caseData = casesData[caseId];
            if (!caseData) return;

            // 基本情報の更新
            document.getElementById('crmCustomerName').textContent = caseData.name;
            document.getElementById('crmName').textContent = caseData.name;
            document.getElementById('crmPhone').textContent = caseData.phone;
            document.getElementById('crmPhone').href = `tel:${caseData.phone}`;
            document.getElementById('crmEmail').textContent = caseData.email;
            document.getElementById('crmAddress').textContent = caseData.address;
            document.getElementById('crmPropertyType').textContent = caseData.propertyType;
            document.getElementById('crmFloors').textContent = caseData.floors;
            document.getElementById('crmAge').textContent = caseData.age;
            document.getElementById('crmWorkItems').textContent = caseData.workItems.join('、');
            document.getElementById('crmMemo').value = caseData.memo || '';

            // 通話履歴の更新
            updateCallHistory(caseData.callHistory);

            // 加盟店リストの更新
            updateFranchiseList(caseData.franchiseStatuses);
        }

        // 通話履歴の更新
        function updateCallHistory(history) {
            const container = document.getElementById('callHistoryList');
            if (!history || history.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">通話履歴がありません</p>';
                return;
            }

            container.innerHTML = history.map(call => `
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-sm font-medium text-gray-900">${call.date}</div>
                            <div class="text-sm text-gray-600 mt-1">${call.duration}</div>
                            <div class="text-sm text-gray-700 mt-2">${call.memo}</div>
                        </div>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(call.result)}">
                            ${call.result}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // 加盟店リストの更新
        function updateFranchiseList(franchises) {
            const container = document.getElementById('franchiseList');
            if (!franchises || Object.keys(franchises).length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">加盟店が配信されていません</p>';
                return;
            }

            container.innerHTML = Object.entries(franchises).map(([id, franchise]) => `
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="text-sm font-medium text-gray-900">${franchise.name}</div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <select class="px-3 py-1 border border-gray-300 rounded-md text-sm" onchange="updateFranchiseStatus('${id}', this.value)">
                                ${['新規配信', '配信済', '不在', '検討中', 'アポ済', '現調済', '見積提出済', '失注', '完了'].map(status => 
                                    `<option value="${status}" ${status === franchise.status ? 'selected' : ''}>${status}</option>`
                                ).join('')}
                            </select>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // クイックアクション
        function quickAction(action, caseId = currentCaseId) {
            if (!caseId) return;
            
            // ステータス更新
            if (action === '不在') casesData[caseId].status = '不在';
            else if (action === '再架電') casesData[caseId].status = '再架電';
            else if (action === 'アポ取得') casesData[caseId].status = 'アポ済';
            else if (action === '見積提出') casesData[caseId].status = '見積提出済';
            else if (action === '失注') casesData[caseId].status = '失注';
            else if (action === '完了') casesData[caseId].status = '完了';
            else if (action === '対応中') casesData[caseId].status = '対応中';

            // UIを更新
            if (currentView === 'list') {
                initializeListView();
            } else {
                // 次の案件へ自動移動（完了・失注以外）
                if (action !== '完了' && action !== '失注') {
                    nextCase();
                } else {
                    loadCRMData(caseId);
                }
            }

            // トースト通知
            showToast(`${casesData[caseId].name}のステータスを「${action}」に更新しました`);
        }

        // CRMタブ切り替え
        function showCRMTab(tab) {
            const tabs = ['info', 'history', 'franchise', 'memo'];
            tabs.forEach(t => {
                const element = document.getElementById(`crmTab${t.charAt(0).toUpperCase() + t.slice(1)}`);
                if (t === tab) {
                    element.classList.remove('hidden');
                } else {
                    element.classList.add('hidden');
                }
            });
        }

        // 次の案件へ
        function nextCase() {
            const caseIds = Object.keys(casesData);
            const currentIndex = caseIds.indexOf(currentCaseId);
            if (currentIndex < caseIds.length - 1) {
                currentCaseId = caseIds[currentIndex + 1];
                loadCRMData(currentCaseId);
            }
        }

        // 前の案件へ
        function previousCase() {
            const caseIds = Object.keys(casesData);
            const currentIndex = caseIds.indexOf(currentCaseId);
            if (currentIndex > 0) {
                currentCaseId = caseIds[currentIndex - 1];
                loadCRMData(currentCaseId);
            }
        }

        // トースト通知
        function showToast(message) {
            // 簡易的なトースト実装
            console.log(message);
        }

        // メモ保存
        function saveMemo() {
            casesData[currentCaseId].memo = document.getElementById('crmMemo').value;
            showToast('メモを保存しました');
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', function() {
            initializeListView();
        });

        // キーボードショートカット
        document.addEventListener('keydown', function(e) {
            if (currentView === 'crm') {
                if (e.key === '1') quickAction('不在');
                else if (e.key === '2') quickAction('再架電');
                else if (e.key === '3') quickAction('アポ取得');
                else if (e.key === 'ArrowRight') nextCase();
                else if (e.key === 'ArrowLeft') previousCase();
                else if (e.key === 'Escape') switchView('list');
            }
        });
    </script>
</body>
</html>
