openapi: 3.0.0
info:
  title: Admin Dashboard API
  description: 塗装業フランチャイズネットワーク本部管理システムAPI
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Development server
  - url: https://api.admin-dashboard.com/v1
    description: Production server

paths:
  /auth/login:
    post:
      summary: ユーザーログイン
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /cases:
    get:
      summary: 案件一覧取得
      tags: [Cases]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [UNASSIGNED, ASSIGNED, IN_PROGRESS, COMPLETED, CANCELLED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: Cases list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CasesList'

    post:
      summary: 新規案件作成
      tags: [Cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        201:
          description: Case created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'

  /cases/{id}:
    get:
      summary: 案件詳細取得
      tags: [Cases]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Case details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'

    put:
      summary: 案件更新
      tags: [Cases]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCaseRequest'
      responses:
        200:
          description: Case updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'

  /cases/{id}/recommendations:
    get:
      summary: AI推薦加盟店取得
      tags: [Cases, AI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: AI recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIRecommendations'

  /cases/{id}/assign:
    post:
      summary: 案件振り分け実行
      tags: [Cases, Assignment]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCaseRequest'
      responses:
        201:
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'

  /cases/{id}/status:
    put:
      summary: 本部ステータス更新
      tags: [Cases, Status]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hqStatus]
              properties:
                hqStatus:
                  type: string
                  enum: [UNASSIGNED, ASSIGNED, IN_PROGRESS, COMPLETED, CANCELLED]
                note:
                  type: string
      responses:
        200:
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'

  /franchises:
    get:
      summary: 加盟店一覧取得
      tags: [Franchises]
      parameters:
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: Franchises list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FranchisesList'

  /franchises/{id}:
    get:
      summary: 加盟店詳細取得
      tags: [Franchises]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Franchise details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Franchise'

  /franchises/{id}/preferences:
    get:
      summary: わがまま設定取得
      tags: [Franchises, Preferences]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Preferences list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesList'

    post:
      summary: わがまま設定追加
      tags: [Franchises, Preferences]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePreferenceRequest'
      responses:
        201:
          description: Preference created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'

  /assignments/{id}/status:
    put:
      summary: 加盟店ステータス更新
      tags: [Assignment, Status]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [franchiseStatus]
              properties:
                franchiseStatus:
                  type: string
                  enum: [RECEIVED, RESPONDING, QUOTED, CONTRACTED, LOST, DECLINED]
                note:
                  type: string
      responses:
        200:
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'

  /transactions:
    post:
      summary: 取引作成
      tags: [Financial]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        201:
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /transactions/{id}/calculate-fee:
    post:
      summary: 紹介料計算
      tags: [Financial]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Fee calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  contractAmount:
                    type: number
                  buildingType:
                    type: string
                  feeRate:
                    type: number
                  feeAmount:
                    type: number

  /transactions/{id}/invoice:
    post:
      summary: 請求書生成
      tags: [Financial]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        201:
          description: Invoice generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceNumber:
                    type: string
                  pdfUrl:
                    type: string

  /ranking/current:
    get:
      summary: 現在のランキング取得
      tags: [Ranking]
      responses:
        200:
          description: Current ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingList'

  /dashboard/metrics:
    get:
      summary: ダッシュボードメトリクス取得
      tags: [Dashboard]
      responses:
        200:
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'

  /notifications:
    get:
      summary: 通知一覧取得
      tags: [Notifications]
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsList'

components:
  schemas:
    Case:
      type: object
      properties:
        id:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        address:
          type: string
        buildingType:
          type: string
          enum: [detached, apartment]
        description:
          type: string
        estimatedValue:
          type: number
        urgency:
          type: string
          enum: [low, medium, high]
        hqStatus:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCaseRequest:
      type: object
      required: [customerName, customerPhone, address, buildingType, description]
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        address:
          type: string
        buildingType:
          type: string
          enum: [detached, apartment]
        description:
          type: string
        estimatedValue:
          type: number
        urgency:
          type: string
          enum: [low, medium, high]

    UpdateCaseRequest:
      type: object
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        address:
          type: string
        buildingType:
          type: string
        description:
          type: string
        estimatedValue:
          type: number
        urgency:
          type: string

    CasesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Case'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Franchise:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        representativeName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        serviceAreas:
          type: array
          items:
            type: string
        capacity:
          type: integer
        currentLoad:
          type: integer
        handicap:
          type: integer
        isActive:
          type: boolean
        performance:
          type: object
          properties:
            successRate:
              type: number
            averageResponseTime:
              type: number
            customerSatisfaction:
              type: number

    FranchisesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Franchise'

    Assignment:
      type: object
      properties:
        id:
          type: string
        caseId:
          type: string
        franchiseId:
          type: string
        aiScore:
          type: number
        aiReasons:
          type: array
          items:
            type: string
        manualOverride:
          type: boolean
        overrideReason:
          type: string
        franchiseStatus:
          type: string
        assignedAt:
          type: string
          format: date-time

    AssignCaseRequest:
      type: object
      required: [franchiseId]
      properties:
        franchiseId:
          type: string
        manualOverride:
          type: boolean
        overrideReason:
          type: string

    AIRecommendations:
      type: object
      properties:
        recommendations:
          type: array
          items:
            type: object
            properties:
              franchiseId:
                type: string
              franchiseName:
                type: string
              score:
                type: number
              reasons:
                type: array
                items:
                  type: string

    Preference:
      type: object
      properties:
        id:
          type: string
        franchiseId:
          type: string
        preferenceType:
          type: string
        conditions:
          type: object
        priority:
          type: integer
        isActive:
          type: boolean

    CreatePreferenceRequest:
      type: object
      required: [preferenceType, conditions]
      properties:
        preferenceType:
          type: string
          enum: [AREA, BUILDING_TYPE, VALUE_RANGE, SCHEDULE, CUSTOMER_TYPE]
        conditions:
          type: object
        priority:
          type: integer

    PreferencesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Preference'

    Transaction:
      type: object
      properties:
        id:
          type: string
        assignmentId:
          type: string
        contractAmount:
          type: number
        buildingType:
          type: string
        feeRate:
          type: number
        feeAmount:
          type: number
        invoiceNumber:
          type: string
        invoiceStatus:
          type: string
        paymentDue:
          type: string
          format: date

    CreateTransactionRequest:
      type: object
      required: [assignmentId, contractAmount, buildingType]
      properties:
        assignmentId:
          type: string
        contractAmount:
          type: number
        buildingType:
          type: string
          enum: [detached, apartment]

    RankingList:
      type: object
      properties:
        period:
          type: string
        rankings:
          type: array
          items:
            type: object
            properties:
              rank:
                type: integer
              franchiseId:
                type: string
              franchiseName:
                type: string
              baseScore:
                type: number
              handicapAdjustment:
                type: number
              finalScore:
                type: number
              metrics:
                type: object

    DashboardMetrics:
      type: object
      properties:
        totalCases:
          type: integer
        unassignedCases:
          type: integer
        inProgressCases:
          type: integer
        completedCases:
          type: integer
        monthlyRevenue:
          type: number
        activefranchises:
          type: integer
        averageResponseTime:
          type: number
        successRate:
          type: number

    NotificationsList:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              title:
                type: string
              message:
                type: string
              createdAt:
                type: string
                format: date-time
              readAt:
                type: string
                format: date-time

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            role:
              type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []